<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmers Point</title>

<style>
body {
  font-family: Arial;
  background: #0d1a0d;
  color: white;
  padding: 15px;
}

h2 {
  text-align: center;
  color: #d4a017;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
}

.product-row {
  background: #111;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}

.product-name {
  font-weight: bold;
}

.product-sub {
  font-size: 13px;
  color: #aaa;
}

.qty-control {
  margin-top: 8px;
}

button {
  padding: 6px 10px;
  margin: 3px;
  border-radius: 6px;
  border: none;
}

.qty-display {
  display: inline-block;
  width: 30px;
  text-align: center;
}

.order-btn {
  background: #25D366;
  color: white;
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  margin-top: 15px;
}
</style>
</head>

<body>

<h2>🌾 Farmers Point</h2>

<input id="custName" placeholder="Enter Name">
<input id="custPhone" placeholder="Enter Phone Number">

<div id="productList"></div>

<button class="order-btn" onclick="sendOrder()">Order on WhatsApp</button>

<script>

// ✅ REAL PRODUCTS
const items = [
  {name:"ಹೆಸರು ಬೇಳೆ",sub:"Green Gram Dal",rate:68,unit:"500g"},
  {name:"ತೊಗರಿ ಬೇಳೆ",sub:"Toor Dal",rate:65,unit:"500g"},
  {name:"ಉದ್ದಿನ ಬೇಳೆ",sub:"Urad Dal",rate:65,unit:"500g"},
  {name:"ಕಡಲೆ ಬೇಳೆ",sub:"Chana Dal",rate:50,unit:"500g"},
  {name:"ಜೋಳ",sub:"Sorghum",rate:60,unit:"1kg"},
  {name:"ಜವಾರಿ ಬಿಳಿ ಗೋಧಿ",sub:"Wheat",rate:60,unit:"1kg"},
  {name:"ಕುಸುಬೆ ಎಣ್ಣೆ",sub:"Safflower Oil",rate:350,unit:"1L"},
  {name:"ಜೋಳದ ರವೆ",sub:"Jowar Rava",rate:60,unit:"1kg"},
  {name:"ಗೋಧಿ ರವೆ",sub:"Wheat Rava",rate:56,unit:"1kg"},
  {name:"ಕರಿ ಕಡಲೆ",sub:"Black Channa",rate:55,unit:"500g"},
  {name:"ಕರಿ ಹುರುಳೆ",sub:"Black Horse Gram",rate:30,unit:"250g"}
];

// RENDER
function renderProducts() {
  const list = document.getElementById('productList');
  list.innerHTML = '';

  items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'product-row';

    row.innerHTML =
      '<div class="product-name">' + item.name + '</div>' +
      '<div class="product-sub">' + item.sub + '</div>' +
      '<div>₹' + item.rate + ' (' + item.unit + ')</div>' +

      '<div class="qty-control">' +
      '<button onclick="changeQty(' + i + ',-1)">-</button>' +
      '<span class="qty-display" id="qd_' + i + '">0</span>' +
      '<button onclick="changeQty(' + i + ',1)">+</button>' +
      '</div>';

    list.appendChild(row);
  });
}

// QTY CHANGE
function changeQty(i, delta) {
  const el = document.getElementById('qd_' + i);
  let val = parseInt(el.innerText);
  val += delta;
  if (val < 0) val = 0;
  el.innerText = val;
}

// SEND ORDER
function sendOrder() {
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();

  if (!phone) {
    alert("Please enter phone number");
    return;
  }

  let total = 0;
  let orderLines = "";

  items.forEach((item, i) => {
    const qty = parseInt(document.getElementById('qd_' + i).innerText);

    if (qty > 0) {
      const price = qty * item.rate;
      total += price;

      orderLines += item.sub + " (" + item.name + ") - " + qty + " x ₹" + item.rate + " = ₹" + price + "\n";
    }
  });

  if (total === 0) {
    alert("Please select items");
    return;
  }

  // ✅ UPDATE YOUR UPI ID HERE
  const upiLink = "upi://pay?pa=yourupi@okaxis&pn=FarmersPoint&am=" + total + "&cu=INR";

  let msg =
    "Farmers Point - New Order\n\n" +
    (name ? "Name: " + name + "\n" : "") +
    "Phone: " + phone + "\n\n" +
    orderLines +
    "\nTotal: ₹" + total + "\n\n" +
    "Please pay using below link:\n" + upiLink + "\n\n" +
    "Amount is already filled. Please don’t change it 🙏";

  const shopPhone = "918722095639";

  window.open("https://wa.me/" + shopPhone + "?text=" + encodeURIComponent(msg), "_blank");
}

// INIT
renderProducts();

</script>

</body>
</html>
