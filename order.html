<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmers Point - Order Now</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #d4a017;
  --green: #2d7a2d;
  --green-bright: #4caf50;
  --bg: #0d1a0d;
  --card-bg: #111;
  --border: rgba(212,160,23,0.35);
  --text: #fff;
  --muted: #aaa;
  --wa: #25D366;
}
body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 20px 14px 120px;
  color: var(--text);
}
.header {
  background: #000;
  max-width: 680px;
  margin: 0 auto;
  border-radius: 20px 20px 0 0;
  border: 1.5px solid var(--gold);
  border-bottom: none;
  padding: 28px 24px 20px;
  text-align: center;
}
.logo-img {
  width: 130px;
  height: 130px;
  object-fit: contain;
  border-radius: 50%;
  display: block;
  margin: 0 auto 16px;
  border: 2px solid rgba(212,160,23,0.4);
}
.shop-tagline {
  font-size: 12px;
  color: var(--green-bright);
  margin-top: 2px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.order-title {
  margin-top: 14px;
  font-size: 13px;
  color: var(--muted);
  background: rgba(45,122,45,0.15);
  border: 1px solid rgba(76,175,80,0.3);
  border-radius: 20px;
  display: inline-block;
  padding: 5px 16px;
}
.card {
  background: var(--card-bg);
  max-width: 680px;
  margin: 0 auto;
  border: 1.5px solid var(--gold);
  border-top: none;
  border-radius: 0 0 20px 20px;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(34,85,34,0.25), 0 8px 40px rgba(0,0,0,0.7);
}

.product-list { padding: 8px 0; }
.product-row {
  display: flex;
  align-items: center;
  padding: 13px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  gap: 12px;
  transition: background 0.2s;
}
.product-row:last-child { border-bottom: none; }
.product-row:hover { background: rgba(255,255,255,0.03); }
.product-info { flex: 1; min-width: 0; }
.product-name { font-size: 15px; font-weight: 600; color: #f0e6c8; }
.product-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.product-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
.qty-badge {
  font-size: 11px; color: var(--green-bright);
  border: 1px solid rgba(76,175,80,0.35);
  border-radius: 12px; padding: 2px 9px;
}
.rate-tag { font-size: 13px; font-weight: 600; color: var(--gold); }
.rate-unit { font-size: 11px; color: var(--muted); }
.qty-control {
  display: flex; align-items: center;
  background: #1a1a1a; border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; flex-shrink: 0;
}
.qty-btn {
  background: none; border: none; color: var(--gold);
  font-size: 20px; width: 36px; height: 36px;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.qty-btn:active { background: rgba(212,160,23,0.15); }
.qty-display {
  width: 36px; text-align: center;
  font-size: 13px; font-weight: 600; color: #fff; user-select: none;
}
.section-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  margin: 4px 18px;
}
.cart-summary { padding: 16px 18px 6px; }
.cart-heading { font-size: 13px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
.cart-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0; border-bottom: 1px dashed rgba(255,255,255,0.07);
  font-size: 13px; color: #ddd;
}
.cart-item:last-child { border-bottom: none; }
.cart-item-name { flex: 1; }
.cart-item-qty { color: var(--muted); margin: 0 10px; white-space: nowrap; }
.cart-item-price { color: var(--gold); font-weight: 600; white-space: nowrap; }
.cart-total {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0 4px; border-top: 1px solid rgba(212,160,23,0.3); margin-top: 8px;
}
.cart-total-label { font-size: 15px; font-weight: 600; }
.cart-total-amount { font-size: 20px; font-weight: 700; color: var(--gold); }
.empty-cart { text-align: center; color: var(--muted); font-size: 13px; padding: 16px 0 10px; }
.field-section { padding: 10px 18px 2px; }
.field-label { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 7px; display: block; }
.field-input {
  width: 100%; background: #1a1a1a; border: 1px solid var(--border);
  border-radius: 10px; color: #fff; font-family: 'DM Sans', sans-serif;
  font-size: 14px; padding: 11px 14px; outline: none; transition: border-color 0.2s;
}
.field-input:focus { border-color: var(--gold); }
.field-input::placeholder { color: #555; }
.field-input.error { border-color: #e05555 !important; }
.order-section { padding: 16px 18px 22px; }
.order-btn {
  width: 100%; background: var(--wa); border: none; border-radius: 14px;
  color: #fff; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600;
  padding: 16px 20px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 10px; transition: background 0.2s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.order-btn:hover { background: #20bf5a; }
.order-btn:active { transform: scale(0.98); }
.order-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }
.footer { text-align: center; padding: 14px; background: #000; border-top: 1px solid rgba(45,122,45,0.4); }
.footer-text { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
.toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #222; border: 1px solid var(--green); color: #fff;
  padding: 12px 22px; border-radius: 30px; font-size: 13px;
  transition: transform 0.3s; z-index: 999; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <img class="logo-img" id="logoImg" alt="Farmers Point Logo">
  <div class="shop-tagline">Order Fresh &bull; Direct from Farm</div>
  <div class="order-title">&#128230; Pick items below &amp; send via WhatsApp</div>
</div>

<div class="card">
  <div class="product-list" id="productList"></div>

  <div class="section-divider"></div>

  <div class="cart-summary">
    <div class="cart-heading">&#128722; Your Order</div>
    <div id="cartItems"><div class="empty-cart">No items added yet</div></div>
    <div class="cart-total" id="cartTotal" style="display:none">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-amount" id="totalAmount">0</span>
    </div>
  </div>

  <div class="section-divider" style="margin-top:10px;"></div>

  <div class="field-section" style="padding-top:16px;">
    <label class="field-label" for="custName">Your Name</label>
    <input class="field-input" type="text" id="custName" placeholder="Enter your name..." oninput="updateCustInfo()">
  </div>

  <div class="field-section" style="padding-bottom:4px;">
    <label class="field-label" for="custPhone">Alternate Phone Number *</label>
    <input class="field-input" type="tel" id="custPhone" placeholder="e.g. 98765 43210" maxlength="15" oninput="updateCustInfo()">
  </div>

   <div class="field-section" style="padding-bottom:4px;">
    <label class="field-label" for="custPhone">Delevary address *</label>
    <input class="field-input" type="Adr" id="custAddress" placeholder="House No:53, CITB, michagan compound saptapur,Dharwad" maxlength="50" oninput="updateCustInfo()">
  </div>

  <div id="custInfoDisplay" style="display:none; margin: 8px 18px 4px; background:rgba(212,160,23,0.1); border:1px solid rgba(212,160,23,0.4); border-radius:10px; padding:10px 14px; font-size:13px; color:#f0e6c8;">
    <div id="custInfoContent"></div>
  </div>

  <div class="order-section">
    <button class="order-btn" id="orderBtn" onclick="sendOrder()" disabled>

      </svg>
      Send Order on WhatsApp
    </button>
  </div>

  <div class="footer">
    <div class="footer-text">Farmers Point &bull; Empowering Farmers &bull; Enriching Lives</div>
  </div>
</div>

const quantities = new Array(items.length).fill(0);




  
function dispQtyStr(i) {
  const v = quantities[i];
  const item = items[i];
  if (v === 0) return '0';
  if (item.unitLabel === 'kg') {
    if (item.step === 1) return v + 'kg';
    return v >= 1000 ? (v/1000)+'kg' : v+'g';
  }
  if (item.unitLabel === 'L')  return v+'L';
  return v >= 1000 ? (v/1000)+'kg' : v+'g';
}

function calcPrice(i) {
  const item = items[i];
  const v = quantities[i];      // quantity in grams, kg, or L

  // step=500 => rate is per 500g (0.5kg), multiply by how many 500g units
  // step=250 => rate is per 250g (0.25kg), multiply by how many 250g units
  // step=1, unitLabel=kg => rate is per 1kg, v is already in kg
  // step=1, unitLabel=L  => rate is per 1L, v is already in L
  if(item.Stock == 'N') return 0;
  if (item.unitLabel === 'g')  return (v / item.step) * item.rate;
  if (item.unitLabel === 'kg') return v * item.rate;
  if (item.unitLabel === 'L')  return v * item.rate;
  return 0;
}

function fmt(n) { return Math.round(n); }

// ── RENDER PRODUCTS ──
function renderProducts() {
  const list = document.getElementById('productList');
  list.innerHTML = '';
  items.forEach((item, i) => {
    const isOut = item.Stock === "N"; // check stock
    const row = document.createElement('div');
    row.className = 'product-row';
    row.innerHTML =
      '<div class="product-info">' +
        '<div class="product-name">' + item.name + '</div>' +
        '<div class="product-sub">' + item.sub + '</div>' +
        '<div class="product-meta">' +
          '<span class="qty-badge">' + item.qty + '</span>' +
          '<span class="rate-tag">' + item.rate + '</span>' +
          '<span class="rate-unit">' + item.unit + '</span>' +
        '</div>' +
       '<div style="margin-top:5px; font-size:12px; font-weight:bold; color:' + (isOut ? 'red' : 'lightgreen') + ';">' +
          (isOut ? 'Out of Stock' : 'In Stock') +
        '</div>' +
      '</div>' +
      '<div class="qty-control">' +
        '<button class="qty-btn" ' + (isOut ? 'disabled' : '') +
        '<button class="qty-btn" onclick="changeQty(' + i + ',-1)">&#8722;</button>' +
        '<div class="qty-display" id="qd_' + i + '">0</div>' +
        '<button class="qty-btn" onclick="changeQty(' + i + ',1)">+</button>' +
      '</div>';
    list.appendChild(row);
  });
}

function changeQty(i, dir) {
  const item = items[i];
  let cur = quantities[i];
   if (items[i].Stock === "N") return; // 🚫 block if out of stock
  cur = dir === 1 ? cur + item.step : Math.max(0, cur - item.step);
  quantities[i] = cur;
  document.getElementById('qd_' + i).textContent = dispQtyStr(i);
  renderCart();
}

function renderCart() {
  const cartDiv  = document.getElementById('cartItems');
  const totalDiv = document.getElementById('cartTotal');
  const totalAmt = document.getElementById('totalAmount');
  const btn      = document.getElementById('orderBtn');

  let html = '', total = 0, hasItems = false;

  items.forEach((item, i) => {
    if (quantities[i] > 0) 
    {
      hasItems = true;
      const price = calcPrice(i);
      total += price;
      html +=
        '<div class="cart-item">' +
          '<span class="cart-item-name">' + item.sub + '</span>' +
          '<span class="cart-item-qty">' + dispQtyStr(i) + '</span>' +
          '<span class="cart-item-price">' + fmt(price) + '</span>' +
        '</div>';
    }
  });

  if (!hasItems) {
    cartDiv.innerHTML = '<div class="empty-cart">No items added yet</div>';
    totalDiv.style.display = 'none';
    btn.disabled = true;
  } else {
    cartDiv.innerHTML = html;
    totalDiv.style.display = 'flex';
    totalAmt.textContent = '=' + fmt(total);
    btn.disabled = false;
  }
}

function updateCustInfo() {
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const display = document.getElementById('custInfoDisplay');
  const content = document.getElementById('custInfoContent');
  const Adr= document.getElementById('custAddress');

  if (name || phone) {
    let html = '';
    if (name) html += '<strong>Name:</strong> ' + name + '<br>';
    if (phone) html += '<strong>Phone:</strong> ' + phone;
    content.innerHTML = html;
    display.style.display = 'block';
  } else {
    display.style.display = 'none';
  }
}

  const phoneField = document.getElementById('custPhone');
  if (!phone) {
    phoneField.classList.add('error');
    phoneField.focus();
    showToast('Please enter your phone number!');
    return;
  }
  phoneField.classList.remove('error');

  let orderLines = [], total = 0, hasItems = false;

  items.forEach((item, i) => {
    if (quantities[i] > 0) {
      hasItems = true;
      const price = calcPrice(i);
      total += price;

      orderLines.push(
        '* ' + item.sub + ' (' + item.name + ') - ' +
        dispQtyStr(i) + ' - Rs.' + fmt(price)
      );
    }
  });

  if (!hasItems) {
    showToast('Please add at least one item!');
    return;
  }

  // ✅ Create UPI link FIRST
  const upiLink = "upi://pay?pa=yourupi@okaxis&pn=FarmersPoint&am=" + total + "&cu=INR";

  const nameStr  = name  ? '*Name:* '  + name  + '\n' : '';
  const phoneStr = '*Phone:* ' + phone + '\n';

  // ✅ Build message properly
  let msg =
    'Farmers Point - New Order\n\n' +
    nameStr + phoneStr + '\n' +
    orderLines.join('\n') +
    '\n\n*Total: Rs.' + fmt(total) + '*\n\n' +
    'Please pay using below link:\n' + upiLink + '\n\n' +
    'Amount is already filled. Please don’t change it 🙏\n\n' +
    '_Sent via Farmers Point Order Page_';

  // WhatsApp send
  const shopPhone = '918722095639';
  window.open(
    'https://wa.me/' + shopPhone + '?text=' + encodeURIComponent(msg),
    '_blank'
  );
}
  
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderProducts();
renderCart();
</script>
</body>
</html>
